<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RMUTL TAK Display</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: "Segoe UI", Tahoma, sans-serif;
}

body{
    background:#f2f2f2;
    color:#222;
    overflow-x:hidden;
}

/* ===== HERO SECTION ===== */

.hero{
    position:relative;
    width:100%;
    height:460px;
    background-image: url("EL.jpg");
    background-size:cover;
    background-position:center;
    display:flex;
    align-items:center;
    justify-content:center;
}

.hero-overlay{
    position:absolute;
    width:100%;
    height:100%;
    background: linear-gradient(
        rgba(139,94,0,0.85),
        rgba(139,94,0,0.65)
    );
}

.hero-content{
    position:relative;
    text-align:center;
    color:white;
}

/* ===== โลโก้ด้านบน ===== */

.hero-logo{
    margin-bottom:30px;
}

.hero-logo img{
    width:120px;        /* ปรับขนาดตราตรงนี้ */
    height:auto;
    filter: drop-shadow(0 6px 15px rgba(0,0,0,0.4));
}

/* ===== ข้อความ ===== */

.hero-content h1{
    font-size:52px;
    font-weight:bold;
}

.hero-content p{
    font-size:28px;
    margin-top:10px;
}

/* ===== CONTENT SECTION ===== */

.container{
    display:flex;
    padding:80px;
    gap:80px;
}

/* ซ้าย */
.left{
    flex:1;
}

.time-title{
    font-size:42px;
    margin-bottom:20px;
}

#clock{
    font-size:160px;
    font-weight:bold;
    color:#8B5E00;
}

#date{
    font-size:36px;
    margin-top:10px;
}

.weather{
    margin-top:30px;
    font-size:30px;
    display:flex;
    gap:50px;
    color:#8B5E00;
}

/* ขวา */
.right{
    flex:1;
}

.news-title{
    font-size:42px;
    color:#8B5E00;
    margin-bottom:30px;
}

.upload-box{
    height:400px;
    border:3px dashed #cfcfcf;
    border-radius:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    color:#666;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
    <div class="hero-overlay"></div>

    <div class="hero-content">

        <!-- ตรามหาวิทยาลัย -->
        <div class="hero-logo">
            <img src="rmutl.png" alt="RMUTL Logo">
        </div>

        <h1>สาขาวิชาวิศวกรรมอิเล็กทรอนิกส์</h1>
        <p>มหาวิทยาลัยเทคโนโลยีราชมงคลล้านนา ตาก</p>

    </div>
</div>

<!-- CONTENT -->
<div class="container">

    <div class="left">
        <div class="time-title">เวลาในประเทศไทย</div>
        <div id="clock">00:00:00</div>
        <div id="date"></div>

        <div class="weather">
            <div>🌡 อุณหภูมิ: 28.6°C</div>
            <div>💧 ความชื้น: 65.6%</div>
        </div>
    </div>

    <div class="right">
        <div class="news-title">ข่าวประชาสัมพันธ์</div>
        <div class="upload-box">
            คลิกเพื่ออัปโหลดรูปข่าว (แนะนำขนาด 16:9)
        </div>
    </div>

</div>

<script>
function updateClock(){
    const now = new Date();
    const options = { 
        weekday:'long', 
        year:'numeric', 
        month:'long', 
        day:'numeric' 
    };

    document.getElementById("clock").innerText =
        now.toLocaleTimeString('th-TH');

    document.getElementById("date").innerText =
        now.toLocaleDateString('th-TH',options);
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
